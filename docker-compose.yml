services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deploycore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deploycore}
      POSTGRES_DB: ${POSTGRES_DB:-deploycore}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deploycore}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
      - iso_storage:/data/isos
      - iso_build_tmp:/data/iso_build_tmp
      - app_asset_storage:/data/app_assets
      - app_asset_build_tmp:/data/app_asset_build_tmp
      - db_backups:/data/backups
      - tls_certs:/data/tls
      # Read-only so the API can hand agents the RustDesk server's public key
      # (generated by the rustdesk container on first run) during enrollment.
      - rustdesk_server_data:/rustdesk-server:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/backend
      - ./worker:/app
      - iso_storage:/data/isos
      - iso_build_tmp:/data/iso_build_tmp
      - db_backups:/data/backups
    command: arq worker.main.WorkerSettings

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  proxy:
    build: ./proxy
    env_file: .env
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
      rustdesk:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - tls_certs:/data/tls
      - caddy_data:/data
    restart: unless-stopped

  updater:
    build: ./updater
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
    depends_on:
      postgres:
        condition: service_healthy

  # Remote Management backend: one all-in-one image bundling the RustDesk
  # rendezvous (hbbs) + relay (hbbr) servers and the rustdesk-api server
  # (its HTTP API, web admin, and the browser-native web client DeployCore
  # embeds). See remote-agent/README.md and backend services/remote_desktop.py.
  # hbbs/hbbr need the full port range reachable from managed agents; 21114 is
  # the api+web-client HTTP port the operator's browser loads the iframe from.
  # ponytail: single all-in-one container over separate hbbs/hbbr/api - the
  # image exists precisely to avoid hand-wiring the three together; split them
  # only if independent scaling ever actually matters.
  rustdesk:
    # Pinned, not :latest - this is early-stage, single-maintainer software, and
    # a floating tag would let a future breaking release land on an unchanged
    # install. Bump deliberately after checking a new tag still works.
    image: lejianwen/rustdesk-server-s6:v0.1.2
    env_file: .env
    environment:
      - RELAY=${RUSTDESK_RELAY_HOST}
      - ENCRYPTED_ONLY=1
      - MUST_LOGIN=N
      - RUSTDESK_API_RUSTDESK_ID_SERVER=${RUSTDESK_RELAY_HOST}:21116
      - RUSTDESK_API_RUSTDESK_RELAY_SERVER=${RUSTDESK_RELAY_HOST}:21117
      # Deliberately blank, not e.g. http://127.0.0.1:21114 (the value this
      # used to be, and the actual root cause of Connect/Shadow silently
      # doing nothing after the mixed-content/same-origin fix). rustdesk-api
      # bakes this straight into webclient2's client-side JS (its own
      # /webclient-config/index.js, confirmed via http/controller/web/index.go)
      # as the base URL every browser-side API call is built from - so
      # "127.0.0.1" meant every operator's own browser tried to reach
      # port 21114 on THEIR OWN machine, not this server, and silently failed
      # (that fetch call has no .catch, so nothing ever surfaced as an error -
      # it just never redeemed the share token, leaving webclient2 sitting on
      # its ordinary empty "no active sessions" screen). Blank makes that JS
      # build a root-relative "/api/shared-peer" instead, which resolves
      # against whatever origin the browser is already on - exactly the
      # existing same-origin Caddy proxy, for any operator, from any machine.
      - RUSTDESK_API_RUSTDESK_API_SERVER=
      # Was RUSTDESK_API_KEY_FILE - missing the "RUSTDESK_" segment every
      # other Rustdesk.* setting above has. rustdesk-api's own config loader
      # (config/config.go: SetEnvPrefix("RUSTDESK_API") over a nested
      # Rustdesk.KeyFile field, mapstructure tag "key-file") only ever binds
      # RUSTDESK_API_RUSTDESK_KEY_FILE - the old name silently matched
      # nothing, so Config.Rustdesk.Key stayed permanently empty and every
      # /api/shared-peer response handed the web client an empty license
      # key. hbbs runs ENCRYPTED_ONLY=1 and rejects that outright - the
      # actual cause of "Schlüssel stimmen nicht überein" (key mismatch),
      # confirmed live, not guessed: reproduced in a fresh private window
      # (ruling out stale cached peer data) before tracing it to this typo.
      - RUSTDESK_API_RUSTDESK_KEY_FILE=/data/id_ed25519.pub
      - RUSTDESK_API_JWT_KEY=${RUSTDESK_JWT_KEY}
      # Some of rustdesk-api's own error strings (e.g. its CAPTCHA-required
      # message) pass straight through into DeployCore's own error surfaces
      # (services/remote_desktop.py's _unwrap) rather than being translated -
      # keep them in English rather than the server's default Chinese.
      - RUSTDESK_API_LANG=en
    ports:
      - "21114:21114"
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21117:21117"
      # Deliberately NOT 21118/21119 (the WebSocket variants of 21116/21117) -
      # the web client reaches those through the proxy service's /ws/id and
      # /ws/relay paths on :443 instead (confirmed live, see
      # proxy/entrypoint.sh), never hitting these ports directly. Only the
      # proxy container needs to reach them, over the internal docker
      # network, which needs no host port published at all.
    volumes:
      - rustdesk_server_data:/data
      - rustdesk_api_data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
  iso_storage:
  iso_build_tmp:
  app_asset_storage:
  app_asset_build_tmp:
  db_backups:
  tls_certs:
  caddy_data:
  rustdesk_server_data:
  rustdesk_api_data:
