name: Build Remote Management Agent MSI

# Produces DeployCoreRemoteAgent.msi on a real Windows runner (it can't be built
# on the Linux hosts DeployCore otherwise uses) and publishes it so DeployCore
# can auto-fetch it (see backend app/services/remote_agent_seed.py).
#
# Runs automatically whenever the agent's own files change on main, so a normal
# `git push` is enough - no tag needed. It keeps a rolling "agent-latest"
# pre-release whose asset URL is stable
# (…/releases/download/agent-latest/DeployCoreRemoteAgent.msi), which is what
# the README, Wiki, and the DeployCore auto-seed all point at. Pushing a real
# `agent-v*` tag additionally publishes a normal versioned release.
on:
  push:
    branches: [main]
    paths:
      - "backend/app/services/remote_agent_install.ps1"
      - "remote-agent/wix/**"
      - ".github/workflows/build-agent-msi.yml"
    tags:
      - "agent-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The MSI wraps the SAME script the running server serves for the
      # one-liner install - copy it in so there's a single source of truth.
      - name: Stage installer script
        shell: pwsh
        run: Copy-Item backend/app/services/remote_agent_install.ps1 remote-agent/wix/Install-DeployCoreAgent.ps1

      # Bundle the stock RustDesk client installer itself, fetched here (this
      # runner has internet) so the install script never needs outbound
      # internet on the target machine - a VM the DeployCore deployment
      # pipeline provisions commonly has none. Version must match
      # $RustDeskVersion in remote_agent_install.ps1.
      - name: Download RustDesk client installer
        shell: pwsh
        run: |
          $version = "1.3.8"
          Invoke-WebRequest -Uri "https://github.com/rustdesk/rustdesk/releases/download/$version/rustdesk-$version-x86_64.msi" -OutFile remote-agent/wix/rustdesk-x86_64.msi -UseBasicParsing
          if (-not (Test-Path remote-agent/wix/rustdesk-x86_64.msi)) { throw "RustDesk client download failed" }

      # Build the branded tray companion, then use it to emit the DeployCore
      # .ico (drawn with GDI+, so no ImageMagick/Inkscape needed). Both get
      # staged next to the .wxs for the MSI to bundle.
      - name: Build tray app + icon
        shell: pwsh
        run: |
          dotnet build remote-agent/tray/DeployCoreTray.csproj -c Release -o remote-agent/tray/bin
          Start-Process -FilePath remote-agent/tray/bin/DeployCoreTray.exe -ArgumentList '--export-icon','deploycore.ico' -WorkingDirectory remote-agent/wix -Wait
          Copy-Item remote-agent/tray/bin/DeployCoreTray.exe remote-agent/wix/DeployCoreTray.exe
          if (-not (Test-Path remote-agent/wix/deploycore.ico)) { throw "icon was not generated" }

      # Pinned to WiX 5: WiX 6+/7 gate behind the paid Open Source Maintenance
      # Fee EULA (error WIX7015), which can't be accepted non-interactively in
      # CI. WiX 5 is the last MIT/free line and uses the same v4 schema + the
      # Wix4UtilCA_X64/WixQuietExec64 custom-action reference this .wxs uses.
      - name: Install WiX
        shell: pwsh
        run: dotnet tool install --global wix --version 5.0.2

      - name: Add WiX UtilExtension
        shell: pwsh
        run: wix extension add -g WixToolset.Util.wixext/5.0.2

      - name: Build MSI
        shell: pwsh
        working-directory: remote-agent/wix
        run: wix build DeployCoreRemoteAgent.wxs -ext WixToolset.Util.wixext -arch x64 -o DeployCoreRemoteAgent.msi

      # Smoke test: install with SKIPRUN=1, which still runs RegisterAgentTask
      # (only RunAgentTask, the one that would need a live server, is gated
      # off) - so this exercises the exact schtasks /create command, including
      # its nested quoting of SERVERURL/ENROLLTOKEN, that a real install
      # depends on. Confirms the task's stored command actually contains the
      # values it was given, catching a quoting mistake here instead of on a
      # real deployment. Then cleans up and uninstalls.
      - name: Smoke test install
        shell: pwsh
        working-directory: remote-agent/wix
        run: |
          $msi = "DeployCoreRemoteAgent.msi"
          $testUrl = "http://smoketest.example.com:8000"
          $testToken = "smoketesttoken123"
          $p = Start-Process msiexec.exe -ArgumentList "/i", "`"$msi`"", "/qn", "SKIPRUN=1", "SERVERURL=`"$testUrl`"", "ENROLLTOKEN=$testToken", "/l*v", "install.log" -Wait -PassThru
          if ($p.ExitCode -ne 0) {
              # The last 40 lines are just the engine's generic property-dump
              # trailer, not the actual cause (confirmed - it hid the real
              # error entirely on the first run of this smoke test). Print
              # every custom-action start/end/return line, which is where the
              # real failure shows, plus a much bigger tail as a fallback.
              Write-Host "--- custom action trace ---"
              Get-Content install.log | Select-String "^Action start|^Action ended|Return value|CustomAction|Error \d|^MSI \(c\)" | ForEach-Object { Write-Host $_.Line }
              Write-Host "--- last 200 lines of install.log ---"
              Get-Content install.log -Tail 200
              throw "MSI install failed with exit code $($p.ExitCode)"
          }
          $installDir = Join-Path ${env:ProgramFiles} "DeployCore Remote Management Agent"
          $script = Join-Path $installDir "Install-DeployCoreAgent.ps1"
          $runCmd = Join-Path $installDir "RunAgentInstall.cmd"
          $bundledRustDesk = Join-Path $installDir "rustdesk-x86_64.msi"
          if (-not (Test-Path $script)) { throw "Installer did not place the agent script at $script" }
          if (-not (Test-Path $runCmd)) { throw "Installer did not place the task launcher at $runCmd" }
          if (-not (Test-Path $bundledRustDesk)) { throw "Installer did not bundle the RustDesk client at $bundledRustDesk" }

          $taskInfo = & schtasks.exe /query /tn DeployCoreAgentInstall /fo list /v 2>&1
          if ($LASTEXITCODE -ne 0) { throw "RegisterAgentTask did not register the scheduled task: $taskInfo" }
          $taskToRun = ($taskInfo | Select-String "^Task To Run:") -join "`n"
          Write-Host "Registered task command: $taskToRun"
          if ($taskToRun -notmatch [regex]::Escape($runCmd)) { throw "Scheduled task command doesn't reference $runCmd - quoting likely broke: $taskToRun" }
          if ($taskToRun -notmatch [regex]::Escape($testUrl)) { throw "Scheduled task command lost the SERVERURL value - quoting likely broke: $taskToRun" }
          if ($taskToRun -notmatch [regex]::Escape($testToken)) { throw "Scheduled task command lost the ENROLLTOKEN value - quoting likely broke: $taskToRun" }
          & schtasks.exe /delete /tn DeployCoreAgentInstall /f | Out-Null

          Start-Process msiexec.exe -ArgumentList "/x", "`"$msi`"", "/qn" -Wait
          Write-Host "Smoke test passed."

      # Always, pass or fail - a failure needs the full log to diagnose (the
      # console tail alone hid the real cause of the first real failure), and
      # keeping it on success too costs nothing and means it's already there
      # if a later, different failure needs it.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: install-log
          path: remote-agent/wix/install.log
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: DeployCoreRemoteAgent
          path: remote-agent/wix/DeployCoreRemoteAgent.msi

      # Rolling pre-release with a stable download URL - refreshed on every
      # qualifying push to main so DeployCore's auto-seed always finds a build.
      - name: Publish rolling agent-latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-latest
          name: Remote Management Agent (latest)
          prerelease: true
          files: remote-agent/wix/DeployCoreRemoteAgent.msi

      # Versioned release when a real agent-v* tag is pushed.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/agent-v')
        uses: softprops/action-gh-release@v2
        with:
          files: remote-agent/wix/DeployCoreRemoteAgent.msi
